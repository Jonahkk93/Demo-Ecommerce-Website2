<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="css/MPWRlogin.css">
    <link rel="stylesheet" href="css/Larke.css">
</head>
<body>
        <!--LOG IN-->
    <div class="container">
        <div class="form-box login">
        <form action="">
            <h1>Log In</h1>
            <div class="input-box">
            <input type="text" placeholder="Email" required>
            </div> <i class=""></i><!--icon-->

            <div class="input-box">
                <input type="password" placeholder="Enter Password" required>
                </div><i class=""></i><!--icon-->

           <!-- <input type="checkbox" class="check-box"><span>Remember Password</span>-->

            <div class="forgot-link">
            <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn">Log In</button>
            <p>or login with</p>
            <div class="social-icons">
                <a href="#"><img src="images/Google.PNG" width="20px" class="social-icons"></a>
                <a href="#"><img src="images/apple.PNG" width="20px" class="social-icons"></a>
            </div>
        </form>
        </div>

        <!--REGISTER-->
            <div class="form-box register">
            <form action="">
                <h1>Sign Up</h1>
                <div class="input-box">
                <input type="text" placeholder="Username" required>
                </div> <i class=""></i><!--icon-->
    
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    </div><i class=""></i><!--icon-->

                <div class="input-box">
                        <input type="password" placeholder="Password" required>
                        </div><i class=""></i><!--icon-->
    
                <button type="submit" class="btn">Sign Up</button>
                <p>or sign up with</p>
                <div class="social-icons">
                <a href="#"><img src="images/Google.PNG" width="20px" class="social-icons"></a>
                <a href="#"><img src="images/apple.PNG" width="20px" class="social-icons"></a>
                </div>
            </form>
         </div>
         

            <div class="toggle-box">
                    <div class="toggle-panel toggle-left">
                        <h1>Hey, Welcome!</h1>
                        <p>How don't you have an account</p>
                        <button class="btn register-btn">Sign Up</button>
                </div>
                    <div class="toggle-panel toggle-right">
                                <h1>Welcome Back!</h1>
                                <p>It's been a while</p>
                                <button class="btn login-btn">Login</button>

              </div>
         </div>
    </div>
    
        
 <script src="js/MPWRlogin.js"></script>
</body>
</html>
