<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Kahuma Jonah</title>
        <link rel="stylesheet" href="css/Larke.css">
        <link rel="stylesheet" href="css/MPWRCheckout.css">
    </head>
    <body>
        <div class="container">
            <div class="checkoutLayout">
                <div class="returnCart">
                    <h1>List Product In Cart</h1>
                    <div class="list">
                        <div class="item">
                            <img src="images/Nails1.jpg" alt="">
                            <div class="info">
                                <div class="name">Lemon Blast</div>
                                <div class="price">UGX20000</div>
                            </div>
                            <div class="quantity">1</div>
                            <div class="returnPrice">34000</div>
                        </div>
                    </div>
                </div>
                <div class="right">
                    <h1>CHECKOUT</h1>
                    <div class="form">
                        <div class="group">
                            <label for="">Full Name</label>
                            <input type="text" name="" id="">
                        </div>
                        <div class="group">
                            <label for="">Phone Number</label>
                            <input type="text" name="" id="">
                        </div>
                        <div class="group">
                            <label for="">Address</label>
                            <input type="text" name="" id="">
                        </div>
                        <div class="group">
                            <label for="">County</label>
                            <select name="" id="">
                                <option value="">Choose..</option>
                                <option value="london">london</option>
                            </select>
                        </div>
                        <div class="group">
                            <label for="">City</label>
                            <select name="" id="">
                                <option value="">Choose..</option>
                                <option value="london">london</option>
                            </select>
                        </div>
                    </div>
                    <div class="return">
                        <div class="row">
                            <div>Total Quantity</div>
                            <div class="totalQuantity">1</div>
                        </div>
                            <div class="row">
                                <div>Total Price</div>
                                <div class="totalPrice">20000</div>
                        </div>
                        <button class="buttonCheckout">
                            CHECKOUT
                        </button>
                    </div>
                </div>
            </div>
        </div>
        </div>
        <script src="js/MPWRCheckout.js"></script>
    </body>
